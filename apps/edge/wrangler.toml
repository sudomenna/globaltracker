name = "globaltracker-edge"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "118836e4d3020f5666b2b8e5ddfdb222"

[[kv_namespaces]]
binding = "GT_KV"
id = "c92aa85488a44de6bdb5c68597881958"
preview_id = "59d0cf1570ca499eb4597fc5218504c2"

[[queues.producers]]
queue = "gt-events"
binding = "QUEUE_EVENTS"

[[queues.producers]]
queue = "gt-dispatch"
binding = "QUEUE_DISPATCH"

[[queues.consumers]]
queue = "gt-events"
max_batch_size = 100
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "gt-events-dlq"

[[queues.consumers]]
queue = "gt-events-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 1

[[queues.consumers]]
queue = "gt-dispatch"
max_batch_size = 10
max_batch_timeout = 5

[triggers]
crons = [
  "*/10 * * * *",   # raw_events outbox poller — re-queues events stuck in pending
  "30 17 * * *",    # cost ingestor
  "0 1 * * *",      # audience sync
]

[vars]
ENVIRONMENT = "development"
# Dev shortcut: workspace UUID fixo para local dev (substitui auth-cp.ts em prod)
# Workspace "Outsiders Digital" — kaxcmhfaqrxwnpftkslj.supabase.co
DEV_WORKSPACE_ID = "74860330-a528-4951-bf49-90f0b5c72521"
# Supabase project URL — used by JWKS verification on auth middleware (ADR-034)
SUPABASE_URL = "https://kaxcmhfaqrxwnpftkslj.supabase.co"
# Bot mitigation — Cloudflare Turnstile (ADR-024)
# Valor real via: wrangler secret put TURNSTILE_SECRET_KEY
# Este placeholder NÃO vai para produção — é substituído pelo secret.
TURNSTILE_SECRET_KEY = "REPLACE_WITH_WRANGLER_SECRET"

# Secrets (não colocar valores aqui — usar wrangler secret put):
# LEAD_TOKEN_HMAC_SECRET
# PII_MASTER_KEY_V1
# TURNSTILE_SECRET_KEY

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "34681cabdb954437ba6db304a235da87"
# Dev local: usar pooler do Supabase (session mode :5432 ou transaction :6543)
# IMPORTANTE: senha não pode commitar — usar variável de ambiente em CI
# Direct host (db.<ref>.supabase.co) não resolve fora da rede CF; sempre usar pooler aqui
localConnectionString = "postgres://postgres.kaxcmhfaqrxwnpftkslj:Yk4tHv9sB2pMxN7eQ3fJrL5w@aws-1-sa-east-1.pooler.supabase.com:5432/postgres"
