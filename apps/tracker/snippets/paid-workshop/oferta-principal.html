        * `clicked_buy_main` via custom event `custom:click_buy_main` no clique

    - Purchase do main_offer chega via webhook Guru server-side.

  Contrato com o tracker.js:
    - O tracker dispara `PageView` automaticamente apenas se `auto_page_view=true`
      (ver apps/tracker/src/index.ts:195). `ViewContent` NÃO é auto-fire em

<script>
(function(){
  // Botão "Comprar Oferta Principal" — Framer não expõe um seletor estável.
  // TODO Tiago: confirmar/ajustar seletor real após publish.
  var BUY_BUTTON_FALLBACK_SELECTORS = [
    'button[data-gt="click_buy_main"]',
    'a[data-gt="click_buy_main"]'
  ];

  // Sem evento `gt:ready` no bundle (verificado em apps/tracker/src/index.ts);
  // polling 50ms × 40 (~2s) com fallback silencioso.
  function withTracker(cb){
    if (window.Funil) { try { cb(window.Funil); } catch (e) {} return; }
    var tries = 0;
    var t = setInterval(function(){
      tries++;
      if (window.Funil) { clearInterval(t); try { cb(window.Funil); } catch (e) {} }
      else if (tries >= 40) { clearInterval(t); /* fail silently */ }
    }, 50);
  }

  // Helper Pixel: dispara fbq com mesmo eventID gerado pelo tracker (dedup CAPI+Pixel).
  function fbqIfAvailable(method, name, customData){
    if (!window.fbq || !window.__funil_event_id) return;
    try {
      fbq(method, name, customData || {}, { eventID: window.__funil_event_id });
    } catch (e) {}
  }

  function findBuyButton(){
    for (var i = 0; i < BUY_BUTTON_FALLBACK_SELECTORS.length; i++){
      var el = document.querySelector(BUY_BUTTON_FALLBACK_SELECTORS[i]);
      if (el) return el;
    }
    var nodes = document.querySelectorAll('button, a[role="button"], a');
    for (var j = 0; j < nodes.length; j++){
      var txt = (nodes[j].textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
      if (txt === 'quero comprar' ||
          txt === 'comprar oferta principal' ||
          txt === 'comprar agora') return nodes[j];
    }
    return null;
  }

  function bootIdentity(){
    var token = null;
    try { token = localStorage.getItem('__gt_ftk'); } catch (e) {}
    withTracker(function(F){
      if (token) F.identify({ lead_token: token });
      // PageView: o tracker auto-fire só roda se event_config.auto_page_view=true.
      // Disparamos explicitamente para uniformidade; o tracker dedupa por
      // event_id via sessionStorage (TTL 5min) — re-fire é absorvido como
      // `event_duplicate_accepted` (esperado, MEMORY).
      F.page();
      // Pixel dispara PageView com mesmo eventID → dedup com CAPI + cria _fbp.
      fbqIfAvailable('track', 'PageView');
      // ViewContent NÃO é auto-fire pelo bundle — disparamos explicitamente
      // (event_config canonical desta page inclui ViewContent).
      F.track('ViewContent');
      fbqIfAvailable('track', 'ViewContent');
    });
  }

  function wireBuyButton(){
    var btn = findBuyButton();
    if (!btn) return; // operador ajusta seletor depois; ausência tolerada.
    // D6: sem popup, click NÃO é interceptado — track + deixa o navegador
    // seguir o link de checkout Guru naturalmente.
    btn.addEventListener('click', function(){
      withTracker(function(F){
        // BR-EVENT-001: prefixo `custom:` é match exato no processor.
        F.track('custom:click_buy_main');
        // Pixel: dispara como InitiateCheckout (mapper CAPI traduz custom:click_buy_main → InitiateCheckout).
        fbqIfAvailable('track', 'InitiateCheckout');
      });
    }, { passive: true });
  }

  function boot(){
    bootIdentity();
    wireBuyButton();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();
</script>
