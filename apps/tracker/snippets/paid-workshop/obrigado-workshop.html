    - É a thank-you do Purchase do workshop, mas o **conteúdo** é uma pesquisa
      curta + botão WhatsApp ao final.
    - Stages disparados aqui:
        * PageView (event_config canonical) → marca chegada na thank-you.
        * Purchase chega via webhook Guru server-side (NÃO client-side).
        * `survey_responded` via custom event `custom:survey_responded`.
        * `wpp_joined` via evento canônico `Contact` no click do botão WhatsApp.

  Contrato com o tracker.js:
    - `auto_page_view` desta page é `false` (operador prefere disparar quando
      identidade já foi resolvida via localStorage). Chamamos `Funil.page()`
      explicitamente após `Funil.identify`.
    - Form de pesquisa: o operador deve marcar o form do Framer com
      `data-gt-survey` para garantir o seletor robusto. TODO Tiago: confirmar.
    - Link WhatsApp: padrão de mercado é `https://wa.me/...` (selector
      `a[href*="wa.me"], a[href*="whatsapp"]`).

  BRs aplicáveis:
    - BR-EVENT-001: custom events trafegam com prefixo `custom:` (matching exato).
    - BR-IDENTITY-005: lead_token vem de `localStorage('__gt_ftk')` (cross-origin).
    - BR-CONSENT-004: tracker já gate consent_analytics='denied' internamente.
-->

<script>
(function(){
  // Form de pesquisa: prefer `data-gt-survey`, fallback para 1º <form> da page.
  var SURVEY_SELECTOR = 'form[data-gt-survey]';
  var SURVEY_FALLBACK_SELECTOR = 'form';

  // Sem evento `gt:ready` no bundle — polling defensivo (verificado em
  // apps/tracker/src/index.ts).
  function withTracker(cb){
    if (window.Funil) { try { cb(window.Funil); } catch (e) {} return; }
    var tries = 0;
    var t = setInterval(function(){
      tries++;
      if (window.Funil) { clearInterval(t); try { cb(window.Funil); } catch (e) {} }
      else if (tries >= 40) { clearInterval(t); /* fail silently */ }
    }, 50);
  }

  // Cross-page identity: __gt_ftk foi setado em workshop.html após /v1/lead.
  function bootIdentity(){
    var token = null;
    try { token = localStorage.getItem('__gt_ftk'); } catch (e) {}
    withTracker(function(F){
      if (token) F.identify({ lead_token: token });
      // Disparamos PageView explicitamente porque event_config desta page tem
      // auto_page_view=false. Purchase NÃO é client-side aqui — chega via
      // webhook Guru server-side.
      F.page();
    });
  }

  // Coleta os campos do form de pesquisa em um objeto chave→valor plano.
  // Multi-value (checkboxes) vira array. Usado como custom_data do evento
  // `custom:survey_responded`. Não inclui PII em claro: o operador deve
  // garantir que o form contém apenas respostas categóricas/escala.
  function collectFormResponses(form){
    var responses = {};
    try {
      var fd = new FormData(form);
      fd.forEach(function(value, key){
        if (typeof value !== 'string') return; // ignora File/blob
        if (responses[key] === undefined) responses[key] = value;
        else if (Array.isArray(responses[key])) responses[key].push(value);
        else responses[key] = [responses[key], value];
      });
    } catch (e) { /* fail silently */ }
    return responses;
  }

  function wireSurvey(){
    var form = document.querySelector(SURVEY_SELECTOR);
    if (!form) form = document.querySelector(SURVEY_FALLBACK_SELECTOR);
    if (!form) return;
    form.addEventListener('submit', function(){
      // Não preventDefault — deixar o form Framer fazer o que normalmente faz
      // (ex.: thank-you sub-state). Track é fire-and-forget.
      var responses = collectFormResponses(form);
      withTracker(function(F){
        // BR-EVENT-001: prefixo `custom:` é match exato no processor.
        F.track('custom:survey_responded', { responses: responses });
      });
    });
  }

  // Botão WhatsApp final → evento canônico Contact (mapeado para stage
  // `wpp_joined` no blueprint v2).
  function wireWhatsApp(){
    var links = document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp"]');
    for (var i = 0; i < links.length; i++){
      links[i].addEventListener('click', function(){
        // Sem preventDefault: track é fire-and-forget (sendBeacon/keepalive
        // dentro do tracker garantem entrega antes da navegação).
        withTracker(function(F){ F.track('Contact'); });
      }, { passive: true });
    }
  }

  function boot(){
    bootIdentity();
    wireSurvey();
    wireWhatsApp();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();
</script>
