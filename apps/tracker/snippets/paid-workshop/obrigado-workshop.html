<script>
(function(){
  // Tracker.js não emite evento `gt:ready` no bundle — polling defensivo.
  function withTracker(cb){
    if (window.Funil) { try { cb(window.Funil); } catch (e) {} return; }
    var tries = 0;
    var t = setInterval(function(){
      tries++;
      if (window.Funil) { clearInterval(t); try { cb(window.Funil); } catch (e) {} }
      else if (tries >= 40) { clearInterval(t); /* fail silently */ }
    }, 50);
  }

  // Cross-page identity: __gt_ftk foi setado em workshop após /v1/lead.
  function bootIdentity(){
    var token = null;
    try { token = localStorage.getItem('__gt_ftk'); } catch (e) {}
    withTracker(function(F){
      if (token) F.identify({ lead_token: token });
      // PageView manual — auto_page_view=false p/ disparar APÓS identify.
      F.page();
    });
  }

  // Fire-and-forget: tracker usa sendBeacon/keepalive para garantir entrega
  // antes do unload pela navegação ao SendFlow.
  function wireWhatsApp(){
    // Selector primário: ID setado no widget Elementor.
    // Fallback: link SendFlow direto (caso ID seja removido).
    var sel = '#gt-btn-wpp-join a, a[href*="sndflw.com"]';
    var links = document.querySelectorAll(sel);
    for (var i = 0; i < links.length; i++){
      links[i].addEventListener('click', function(){
        withTracker(function(F){
          // BR-EVENT-001: prefixo `custom:` é matching exato.
          F.track('custom:click_wpp_join');
        });
      }, { passive: true });
    }
  }

  function boot(){
    bootIdentity();
    wireWhatsApp();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();
</script>
