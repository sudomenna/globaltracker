<!--
  Snippet canônico — Page `workshop` (role: sales, funnel_role: workshop)
  Funil B v3 — `lancamento_pago_workshop_com_main_offer` — Sprint 12 Onda 3 (WordPress)

  Papel desta page no funil v3:
    - Botão CTA "Garantir minha vaga" dentro de #checkout abre popup Elementor com form.
    - Click no botão = stage `clicked_buy_workshop` (custom:click_buy_workshop, intent).
    - Submit do form da popup = stage `lead_workshop` (Lead) + redirect pro Guru
      com query params nome/email/telefone (+ UTMs preservados).

  Contrato com o tracker.js:
    - `auto_page_view: true` → PageView automático no init.
    - Botão CTA selector: `#gt-btn-buy-workshop1` (CSS ID setado no widget Elementor).
      Clique → preventDefault → custom event → abrir popup via API Elementor Pro.
    - Form selector: `#gt-form-workshop` (Elementor 4.0 atomic form).
    - Inputs: `[name="name"]`, `[name="email"]`, `[name="phone"]`.
    - Popup ID Elementor: 342 (post type elementor_library type=popup).

  Redirect Guru (após Lead capturado):
    - URL base: https://clkdmg.site/pay/workshop-contratos-societarios
    - Params adicionados: name, email, phone, + UTMs canônicos da location atual.

  BRs aplicáveis:
    - BR-EVENT-001: custom events trafegam com prefixo `custom:` (matching exato no processor).
    - BR-IDENTITY-005: lead_token persiste em localStorage `__gt_ftk` (cross-origin compatível).
    - BR-CONSENT-004: tracker já gate consent_analytics='denied' internamente.

  WPCode setup (3 snippets — head + 2 footer separados ou unificados):
    - HEAD: tracker.js tag.
    - FOOTER: bootstrap (PageView manual ou auto), wire button, wire form.
    - Smart Conditional Logic: URL contém `/wk-societarios-1/`.
-->

  data-site-token="4beab6557f55b6fa0e0ee9c092fed94a2673eb7853ce502f486576e91a574093"

<!-- WPCode snippet 2: FOOTER        -->
<!-- Localização: "Rodapé em todo o site" -->
<!-- ============================== -->
<script>
(function(){
  var EDGE_URL = 'https://globaltracker-edge.globaltracker.workers.dev';
  var LAUNCH_PUBLIC_ID = 'wkshop-cs-jun26';
  var PAGE_PUBLIC_ID = 'workshop';
  var BUY_BTN_SELECTOR = '#gt-btn-buy-workshop1 a, #gt-btn-buy-workshop1';
  var FORM_SELECTOR = '#gt-form-workshop';
  var POPUP_ID = 342;
  var GURU_BASE_URL = 'https://clkdmg.site/pay/workshop-contratos-societarios';
  var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term',
                  'fbclid','gclid','msclkid','ttclid','epik'];

  // BR-EVENT-001 dedup: flag por 3s impede dispatch duplicado em race condition.
  var firing = false;

  function withTracker(cb){
    if (window.Funil) { try { cb(window.Funil); } catch (e) {} return; }
    var tries = 0;
    var t = setInterval(function(){
      tries++;
      if (window.Funil) { clearInterval(t); try { cb(window.Funil); } catch (e) {} }
      else if (tries >= 40) { clearInterval(t); }
    }, 50);
  }

  // Helper Pixel: dispara fbq com mesmo eventID gerado pelo tracker.
  // Tracker seta window.__funil_event_id sincronamente ao chamar F.track/F.page,
  // então chamar fbqIfAvailable logo após dispatch garante dedup CAPI+Pixel.
  function fbqIfAvailable(method, name, customData){
    if (!window.fbq || !window.__funil_event_id) return;
    try {
      fbq(method, name, customData || {}, { eventID: window.__funil_event_id });
    } catch (e) {}
  }

  // Tracker dispara PageView automático no init (auto_page_view=true), não via snippet.
  // Esperamos window.__funil_event_id ser setado e disparamos fbq com mesmo id —
  // isso (a) cria o cookie _fbp (Pixel só seta no primeiro track) e
  // (b) dedupe o PageView Pixel com o CAPI.
  function fbqAutoPageView(){
    if (!window.fbq) return;
    var attempts = 0;
    var t = setInterval(function(){
      attempts++;
      if (window.__funil_event_id) {
        clearInterval(t);
        try {
          fbq('track', 'PageView', {}, { eventID: window.__funil_event_id });
        } catch (e) {}
      } else if (attempts >= 60) {
        clearInterval(t);
      }
    }, 100);
  }

  function openPopup(){
    if (window.elementorProFrontend && window.elementorProFrontend.modules &&
        window.elementorProFrontend.modules.popup) {
      try {
        // API canônica: dispatchEvent('elementor/popup/show', ...) ou showPopup
        // showPopup({id}) é a forma documentada na 4.0+.
        window.elementorProFrontend.modules.popup.showPopup({ id: POPUP_ID });
      } catch (e) {
        console.warn('[gt] popup open failed', e);
      }
    }
  }

  // Botão "Garantir minha vaga" dentro de #checkout — dispara intent + abre popup.
  // Não há href válido (Elementor stripou #elementor-action), por isso preventDefault sempre.
  function wireBuyButton(){
    var nodes = document.querySelectorAll(BUY_BTN_SELECTOR);
    for (var i = 0; i < nodes.length; i++){
      nodes[i].addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        withTracker(function(F){
          F.track('custom:click_buy_workshop');
          // Pixel: dispara como InitiateCheckout (mapper CAPI traduz custom:click_buy_workshop → InitiateCheckout).
          fbqIfAvailable('track', 'InitiateCheckout');
        });
        openPopup();
      });
    }
  }

  // Lê UTMs canônicos da query string da page atual (preservados pelos CTAs/UTMs Builder).
  function readUtms(){
    var p = new URLSearchParams(window.location.search);
    var out = {};
    UTM_KEYS.forEach(function(k){
      var v = p.get(k);
      if (v) out[k] = v;
    });
    return out;
  }

  // Monta a URL Guru de checkout com todos os params aplicáveis.
  function buildCheckoutUrl(name, email, phone){
    var qs = new URLSearchParams();
    if (name) qs.set('name', name);
    if (email) qs.set('email', email);
    if (phone) qs.set('phone', phone);
    var utms = readUtms();
    Object.keys(utms).forEach(function(k){ qs.set(k, utms[k]); });
    return GURU_BASE_URL + '?' + qs.toString();
  }

  // Form da popup — POST /v1/lead, persist __gt_ftk, identify+track('Lead'), redirect Guru.
  function wireForm(){
    // Atomic Elementor form pode ainda não estar montado quando popup abre depois.
    // Usamos delegação no document pra capturar o submit mesmo se o form aparece tardiamente.
    document.addEventListener('submit', function(ev){
      var form = ev.target;
      if (!form || form.id !== 'gt-form-workshop') return;
      if (firing) { ev.preventDefault(); ev.stopImmediatePropagation(); return; }

      var nameEl = form.querySelector('[name="name"]');
      var emailEl = form.querySelector('[name="email"]');
      var phoneEl = form.querySelector('[name="phone"]');
      var name = nameEl && nameEl.value ? nameEl.value.trim() : '';
      var email = emailEl && emailEl.value ? emailEl.value.trim() : '';
      var phone = phoneEl && phoneEl.value ? phoneEl.value.trim() : '';
      if (!name || !email || !phone) return; // browser validation handles required

      // Bloquear o handler bubble-phase do Elementor (`elementor_pro_atomic_forms_send_form`)
      // que dispara em paralelo. Sem ações configuradas, ele responde
      // {success:false, message:"No actions configured"} → popup mostra erro vermelho
      // antes do redirect Guru completar. Validado seguro: HTML5 validation já rodou
      // antes do submit event; estado visual do Elementor já está aplicado.
      ev.preventDefault();
      ev.stopImmediatePropagation();
      firing = true;
      setTimeout(function(){ firing = false; }, 3000);

      var eventId = (crypto && crypto.randomUUID) ? crypto.randomUUID()
        : (Date.now() + '-' + Math.random().toString(36).slice(2));
      var body = {
        event_id: eventId,
        schema_version: 1,
        launch_public_id: LAUNCH_PUBLIC_ID,
        page_public_id: PAGE_PUBLIC_ID,
        name: name,
        email: email,
        phone: phone,
        attribution: readUtms(),
        // Lead opt-in via form submit → todas as finalidades granted
        consent: {
          analytics: 'granted',
          marketing: 'granted',
          ad_user_data: 'granted',
          ad_personalization: 'granted',
          customer_match: 'granted'
        }
      };

      var siteTokenTag = document.querySelector('script[data-site-token]');
      var siteToken = siteTokenTag ? siteTokenTag.getAttribute('data-site-token') : '';

      function redirectToCheckout(){
        try { window.location.href = buildCheckoutUrl(name, email, phone); }
        catch (e) { /* if redirect fails, user stays in popup with no feedback */ }
      }

      fetch(EDGE_URL + '/v1/lead', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          'X-Funil-Site': siteToken
        },
        body: JSON.stringify(body)
      })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(resp){
        if (resp && resp.lead_token) {
          try { localStorage.setItem('__gt_ftk', resp.lead_token); } catch (e) {}

          // Garante redirect único mesmo se withTracker e o fallback dispararem próximos.
          var redirected = false;
          function safeRedirect(){ if (!redirected){ redirected = true; redirectToCheckout(); } }

          // Fallback: se o tracker.js ainda não carregou após 2s, redireciona sem Lead.
          // keepalive: true no sendEvent garante que requests já em-voo completam pós-redirect.
          setTimeout(safeRedirect, 2000);

          withTracker(function(F){
            F.identify({ lead_token: resp.lead_token });
            F.track('Lead');
            // Pixel browser dispara Lead com mesmo eventID → Meta deduplica com CAPI.
            fbqIfAvailable('track', 'Lead');
            // 120ms: margem para sendEvent (keepalive) entrar em-voo antes do redirect.
            setTimeout(safeRedirect, 120);
          });
        } else {
          // /v1/lead respondeu sem token — redireciona sem identify.
          setTimeout(redirectToCheckout, 120);
        }
      })
      .catch(function(e){
        console.warn('[gt] lead capture failed', e);
        // Em caso de erro no /v1/lead, redireciona mesmo assim para não travar o usuário.
        setTimeout(redirectToCheckout, 120);
      });
    }, true); // capture phase: roda antes de qualquer outro listener interno do Elementor
  }

  function boot(){
    wireBuyButton();
    wireForm();
    fbqAutoPageView();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();
</script>
