  MVP binário (D3/D4 — Sprint 12):

  Evolução futura (pós-Sprint 12, ver §"Sobre tracking da aula" do roadmap 12):

    2) Vimeo Live + heartbeat: player embedded; heartbeat a cada 30s via

  Substituições antes de colar no Framer:

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------
  // withTracker(cb): aguarda a API global window.Funil ficar pronta.
  // O entry point do tracker (apps/tracker/src/index.ts) instala
  // window.Funil sincronamente assim que o <script> async é parseado,
  // mas a inicialização interna (fetch de /v1/config + leitura do
  // cookie __ftk) é assíncrona e roda em DOMContentLoaded.
  //
  // NÃO existe um evento `gt:ready` no tracker atual (verificado em
  // apps/tracker/src/index.ts). Polling é a única opção robusta.
  // ---------------------------------------------------------------
  function withTracker(cb) {
    if (window.Funil && typeof window.Funil.track === 'function') {
      try { cb(window.Funil); } catch (e) { /* fail silently */ }
      return;
    }
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      if (window.Funil && typeof window.Funil.track === 'function') {
        clearInterval(iv);
        try { cb(window.Funil); } catch (e) { /* fail silently */ }
      } else if (tries >= 40) {
        // 40 × 50ms = 2s de timeout; tracker.js não carregou ou falhou
        // INV-TRACKER-007: degradar silenciosamente, sem quebrar a page
        clearInterval(iv);
      }
    }, 50);
  }

  // ---------------------------------------------------------------
  // Identify + PageView. Tem que rodar antes do click do botão para
  // que `custom:watched_workshop` saia já com `lead_token` no payload.
  //
  // BR-IDENTITY-005: lê __gt_ftk do localStorage (escrito na page
  // workshop quando o form de Lead foi submetido com sucesso).
  // ---------------------------------------------------------------
  withTracker(function (Funil) {
    var token = null;
    try { token = window.localStorage.getItem('__gt_ftk'); } catch (e) {}

    if (token) {
      Funil.identify({ lead_token: token });
    } else {
      // Lead chegou em aula-workshop sem ter passado pelo form na page
      // workshop — ou localStorage foi limpo (ITP, modo anônimo, device
      // novo). PageView ainda é registrado (anônimo); o stage
      // `watched_workshop` SÓ vai disparar de fato no processor se o
      // click acontecer e o lead estiver identificado por algum outro
      // canal (ex.: voltou para captura-v1 antes). Aceitável no MVP.
      try {
        console.warn('[gt] aula-workshop sem __gt_ftk no localStorage — ' +
                     'lead anônimo; PageView registra mas stage não dispara');
      } catch (e) {}
    }

    // PageView (auto_page_view do tracker pode estar habilitado pelo
    // /v1/config, mas chamamos manualmente para garantir que ocorra
    // DEPOIS do identify acima — assim o evento já carrega lead_token).
    Funil.page();
  });

  // ---------------------------------------------------------------
  // Botão "Já assisti" → custom:watched_workshop
  //
  // Seletor primário: [data-gt-watched]
  //   TODO Tiago: no Framer, abrir as configurações do botão "Já
  //   assisti" e adicionar atributo custom `data-gt-watched` (sem
  //   valor). É a forma mais robusta — independe de copy.
  //
  // Fallback: qualquer <button>/<a>/elemento clicável cujo texto
  // contenha "já assisti" (case-insensitive, com/sem acento). Útil
  // enquanto Tiago não adiciona o data-attribute.
  //
  // Idempotência: flag `watched` previne duplo-track no mesmo
  // carregamento (o processor dedupa por event_id no servidor, mas
  // economiza request de rede). Nova navegação para a page volta a
  // permitir o evento (intencional — re-confirmar assistência se a
  // sessão foi recarregada conta como novo "watched_workshop";
  // o stage é idempotente por (lead_id, stage) no DB).
  // ---------------------------------------------------------------
  var watched = false;

  function looksLikeJaAssisti(el) {
    if (!el) return false;
    if (el.matches && el.matches('[data-gt-watched]')) return true;
    var txt = (el.textContent || '').trim().toLowerCase();
    if (!txt) return false;
    // Aceita "já assisti", "ja assisti", "Já Assisti", "JÁ ASSISTI"
    return txt.indexOf('já assisti') !== -1 || txt.indexOf('ja assisti') !== -1;
  }

  function findClickable(start) {
    var el = start;
    var hops = 0;
    while (el && hops < 5) {
      if (
        el.tagName === 'BUTTON' ||
        el.tagName === 'A' ||
        (el.getAttribute && el.getAttribute('role') === 'button') ||
        (el.matches && el.matches('[data-gt-watched]'))
      ) {
        return el;
      }
      el = el.parentElement;
      hops++;
    }
    return null;
  }

  // BR-EVENT-001: nome literal `custom:watched_workshop` (matching
  // exato no processor — sem normalização de prefixo no servidor).
  function fireWatched() {
    if (watched) return;
    watched = true;
    withTracker(function (Funil) {
      Funil.track('custom:watched_workshop');
    });
  }

  // Delegação no document para sobreviver a re-renders do Framer.
  document.addEventListener(
    'click',
    function (ev) {
      try {
        var clickable = findClickable(ev.target);
        if (!clickable) return;
        if (looksLikeJaAssisti(clickable)) {
          fireWatched();
        }
      } catch (e) {
        // INV-TRACKER-007: erro no listener não pode quebrar a page
      }
    },
    true /* capture: pega o evento antes de navegação/preventDefault da page */
  );
})();
</script>
